        template: "# \U0001F339 香水短视频专业分析报告\n\n## \U0001F4CA **视频基本信息**\n基于上传的视频文件进行分析\n\n---\n\n## \U0001F3AF **7维度专业评估结果**\n\n{{#1735636859568.analysis_result#}}\n\n---\n\n## \U0001F3A8 **西班牙市场本地化方案**\n\n{{#1735636859668.text#}}\n\n---\n\n## \U0001F4DD **总结与建议**\n\n本报告基于专业的7维度评估体系，为香水类短视频在西班牙TikTok市场的优化提供科学指导。\n\n**关键改进方向：**\n- 优先处理评分低于80分的维度\n- 重点关注前3秒的吸引力设计\n- 加强西班牙文化本地化元素\n- 优化香水产品的视觉展示效果\n\n**下一步行动：**\n1. 根据即时优化建议调整当前内容\n2. 应用提供的西班牙语文案进行测试\n3. 制定重拍计划应对严重问题\n4. 建立长期内容策略优化机制\n\n---\n\n*\U0001F4DE 如需进一步的专业咨询或定制化分析，请联系我们的香水短视频营销专家团队。*"
