            temperature: 0.3
          mode: chat
          name: gpt-4o
          provider: openai
        prompt_template:
        - id: 5a32e327-7747-4dcb-8d29-0c4b62f5ecac
          role: system
          text: "你是「短视频精灵」(Perfume Video Wizard)，一个专业的香水类短视频内容分析师，具备以下专业能力：\n\n**专业领域**：\n- \U0001F3AC 短视频内容分析与审核专家\n- \U0001F339 香水产品营销策略顾问  \n- \U0001F1EA\U0001F1F8 西班牙TikTok市场本地化专家\n- \U0001F4F1 多模态内容识别与评估专家\n\n**核心技能**：\n1. 视频内容全维度解析(画面、声音、文字)\n2. 基于7大专业维度的量化评估\n3. 西班牙语文化适配和双语文案创作\n4. 可执行的优化建议生成\n\n**工作原则**：\n- 评估标准科学严谨，评分有据可依\n- 建议具体可操作，避免空泛概念\n- 充分考虑香水产品特殊性和拍摄限制\n- 文案创作符合西班牙文化和TikTok传播特点"
        - id: 50e6b4c3-eda2-43d1-b624-c3a2dd7e3156
          role: user
          text: "请对上传的香水短视频进行全面分析，按照以下步骤执行：\n\n## 第一步：视频内容识别\n\n**技术解析要求**：\n1. **基本信息提取**：视频时长、分辨率、主要场景\n2. **画面内容描述**：\n   - 拍摄场景和环境布置\n   - 香水产品展示方式和角度\n   - 人物动作和手势(考虑无人脸出镜限制)\n   - 道具使用和色彩搭配\n3. **文字信息识别**：字幕、屏幕文字、品牌标识\n4. **音频内容分析**：口播内容、背景音乐风格、音效使用\n5. **产品信息识别**：香水品牌、瓶身设计特征、使用场景\n\n## 第二步：7维度专业评估\n\n按照以下评估体系对视频进行量化评分(每个维度100分，总分700分)：\n\n### 1. \U0001F3AF 吸引力维度 (前3秒表现)\n**评分权重分配**：\n- 情绪冲击力(40分)：开场3秒内的情绪钩子强度\n- 视觉张力(35分)：色彩、构图、动作的视觉吸引力\n- 卖点切入(25分)：产品和核心价值的展示速度\n\n**评分标准**：\n- 90-100分：多重吸引元素完美融合，瞬间抓住注意力\n- 80-89分：有明显亮点，能有效吸引用户停留\n- 70-79分：有吸引元素但不够突出\n- 60-69分：吸引力一般，需要优化\n- 60分以下：缺乏有效吸引点\n\n**特别关注**：\n- 避免过度夸张：\"震惊！这款香水让男神为我疯狂\"\n- 推荐自然好奇：\"用了三年的香水，今天才发现这个秘密\"\n\n### 2. \U0001F3A8 内容创意维度\n**评分权重分配**：\n- 共鸣感建立(40分)：是否贴近西班牙女性日常生活\n- 创意融合度(35分)：创意与产品展示的自然结合\n- 场景代入感(25分)：使用场景的真实性和代入感\n\n**西班牙市场特殊要求**：\n- 生活方式是否贴近当地女性日常\n- 情感表达是否符合拉丁文化习惯\n- 香水使用场景是否符合当地社交文化\n\n### 3. \U0001F3AF 主题聚焦维度\n**评分权重分配**：\n- 卖点明确度(45分)：核心价值表达的清晰度\n- 场景契合度(35分)：使用场景与产品特点的匹配\n- 用户匹配度(20分)：内容与目标用户群体的契合\n\n**香水卖点层次分析**：\n- 基础功能：香味特征、持久度、适用场合\n- 情感价值：魅力提升、自信建立、个性表达\n- 社交价值：印象改善、社交加分、品味体现\n\n### 4. ⏰ 节奏控制维度\n**评分权重分配**：\n- 切换顺畅度(40分)：画面转换的自然流畅程度\n- 高潮设置(35分)：是否有明显的情绪高潮点\n- 音画同步度(25分)：BGM与画面节奏的协调性\n\n**香水拍摄特殊要求**：\n- 喷洒动作的慢镜头处理效果\n- 瓶身细节的特写时机\n- 香味扩散的视觉化表达\n\n### 5. \U0001F4DD 文案引导力维度\n**评分权重分配**：\n- 钩子文案效果(45分)：开场文案的吸引力和自然度\n- 卖点导入逻辑(35分)：从钩子到产品的逻辑流畅性\n- 互动引导自然度(20分)：评论引导的自然程度\n\n**避免模板化表达**：\n- ❌ \"99%的女生都不知道...\"\n- ❌ \"看完这个你就明白了...\"\n- ✅ 创造独特且自然的表达方式\n\n### 6. \U0001F3A8 画面美感维度\n**评分权重分配**：\n- 技术质量(40分)：清晰度、稳定性、曝光控制\n- 美学风格(35分)：色彩搭配与香水调性的匹配\n- 产品展示质量(25分)：香水瓶身的展示效果\n\n**无人脸拍摄创意评估**：\n- 手部动作的优雅程度\n- 身体局部展示的美感\n- 环境氛围的营造效果\n\n### 7. \U0001F3B5 声音配乐维度\n**评分权重分配**：\n- 口播质量(45分)：语音清晰度和情绪表达\n- 配乐契合度(35分)：BGM与香水调性、西班牙文化的匹配\n- 整体协调性(20分)：音画同步和音效运用\n\n## 第三步：问题诊断\n基于评估结果，识别主要问题：\n- 列出得分低于80分的维度\n- 分析具体问题点和影响程度\n- 评估改进的紧急程度和难易度\n\n**输出要求**：\n每个维度提供具体评分和详细评分依据，问题诊断要具体到可操作的改进点。\n\n**视频文件**：{{#1735636859084.video_files#}}\n**提取的文字信息**：{{#1735636859268.text#}}"
