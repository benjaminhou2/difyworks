        text: "你是香水短视频文案创作和优化建议专家，擅长西班牙市场本地化和TikTok内容策略。"
      - id: 8b9f3c32-5d6e-4c7f-9a0b-2e3f4a5b6c7d
        role: user
        text: "基于前面的视频分析结果，请完成以下任务：\n\n## 任务1：西班牙市场文案创作\n\n为西班牙TikTok市场创作3条本地化文案：\n\n**目标用户**：18-35岁西班牙女性，注重品质但价格敏感，重视家庭和社交关系\n\n**语言风格**：\n- 情感表达直接热情，符合拉丁文化特点\n- 使用贴近生活的口语化表达\n- 适量融入当地流行语和表达习惯\n- 避免过于正式的商业化表达\n\n**文案类型分布**：\n1. **情感共鸣型**：建立情感连接，引发共鸣\n2. **产品功能型**：突出香水的核心价值和效果\n3. **互动引导型**：自然引导用户参与互动\n\n**创作格式**：\n### 文案1：情感共鸣型\n**中文版本**：[50-80字，重点在情感建立]\n**西班牙语版本**：[完整翻译+本地化调整，注意语法和文化适配]\n**应用场景**：[具体使用时机和场合]\n**预期效果**：[希望达到的用户反应]\n\n### 文案2：产品功能型  \n**中文版本**：[50-80字，重点在产品卖点]\n**西班牙语版本**：[完整翻译+本地化调整]\n**应用场景**：[具体使用时机和场合]\n**预期效果**：[希望达到的用户反应]\n\n### 文案3：互动引导型\n**中文版本**：[50-80字，重点在互动引导]\n**西班牙语版本**：[完整翻译+本地化调整]\n**应用场景**：[具体使用时机和场合]\n**预期效果**：[希望达到的用户反应]\n\n## 任务2：优化建议生成\n\n基于分析结果，提供具体可执行的优化建议：\n\n### 即时优化 (可立即调整，无需重拍)\n针对评分60-79分的问题，提供：\n- **具体问题点**：明确指出需要调整的内容\n- **调整方法**：详细的操作步骤\n- **预期效果**：调整后的改善程度\n\n### 重拍建议 (需要重新制作内容)\n针对评分60分以下的严重问题，提供：\n- **核心问题分析**：根本原因和影响程度\n- **重拍关键要点**：必须改进的核心元素\n- **参考案例方向**：成功案例的特点分析\n\n### 策略升级 (长期内容策略改进)\n基于整体表现，提供：\n- **内容策略调整方向**：未来内容创作的重点\n- **拍摄技巧提升建议**：技术层面的改进空间\n- **市场趋势对接建议**：与当前趋势的结合点\n\n**分析结果数据**：{{#1735636859568.analysis_result#}}\n\n**质量要求**：\n- 西班牙语语法必须正确且自然\n- 建议必须具体可操作\n- 充分考虑香水产品特殊性和拍摄限制\n- 体现对西班牙市场文化的理解"
