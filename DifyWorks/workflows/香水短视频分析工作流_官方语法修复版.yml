            - **切换顺畅度**: [具体分析]
            - **高潮设置**: [具体分析]
            - **音画同步度**: [具体分析]
            - **总体评价**: [综合评价]

            ## ⚠️ 主要问题诊断
            [列出发现的主要问题和改进建议]
            ```

