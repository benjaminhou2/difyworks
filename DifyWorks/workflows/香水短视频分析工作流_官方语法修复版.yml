            ## 📊 核心维度评估（第一组）

            基于内容识别结果：{{#1736412003000.text#}}

            请对以下4个维度进行专业评估，每个维度满分100分：

            ### 1. 🎯 吸引力指数 (0-100分)

            **评估细则:**
            - 90-100分: 多重吸引元素完美融合，瞬间抓住注意力
            - 80-89分: 有明显亮点，能有效吸引用户停留
            - 70-79分: 有吸引元素但不够突出
            - 60-69分: 吸引力一般，需要优化
            - 60分以下: 缺乏有效吸引点

            **评估指标:**
            - 情绪冲击力 (40%权重): 前3秒的情绪建立
            - 视觉张力 (35%权重): 色彩搭配、构图美感、动作设计
            - 卖点切入速度 (25%权重): 产品出现时机和价值传达

            ### 2. 🎨 内容创意指数 (0-100分)

            **评估细则:**
            - 90-100分: 创意独特，与产品完美融合，具有传播潜力
            - 80-89分: 有创意亮点，整体表现良好
            - 70-79分: 创意一般，缺乏记忆点
            - 60-69分: 创意平庸，需要重新构思
            - 60分以下: 缺乏创意，内容乏味

            **评估指标:**
            - 共鸣感建立 (40%权重): 与西班牙女性用户的情感连接
            - 创意与产品融合度 (35%权重): 创意是否自然展现产品特点
            - 使用场景代入感 (25%权重): 场景真实性和代入感

            ### 3. 🎯 主题聚焦度 (0-100分)

            **评估细则:**
            - 90-100分: 主题明确，卖点突出，用户理解成本低
            - 80-89分: 主题清晰，有少量干扰信息
            - 70-79分: 主题基本清晰，但不够聚焦
            - 60-69分: 主题模糊，重点不突出
            - 60分以下: 主题混乱，用户难以理解

            **评估指标:**
            - 卖点明确度 (45%权重): 香水核心价值是否清晰传达
            - 场景契合度 (35%权重): 使用场景是否与目标用户匹配
            - 目标用户匹配度 (20%权重): 是否符合西班牙18-35岁女性偏好

            ### 4. ⏰ 节奏控制力 (0-100分)

            **评估细则:**
            - 90-100分: 节奏完美，有明显层次和高潮点
            - 80-89分: 节奏良好，过渡自然
            - 70-79分: 节奏一般，有优化空间
            - 60-69分: 节奏问题明显，影响观看体验
            - 60分以下: 节奏混乱，用户难以跟上

            **评估指标:**
            - 切换顺畅度 (40%权重): 镜头转换频率和自然度
            - 高潮设置 (35%权重): 情绪高潮点的设计和时机
            - 音画同步度 (25%权重): BGM与画面的配合度

            ## 📤 输出格式

            ```
            # 核心维度评估报告（第一组）

            ## 📊 评分结果
            1. **吸引力指数**: [X]/100分
            2. **内容创意指数**: [X]/100分  
            3. **主题聚焦度**: [X]/100分
            4. **节奏控制力**: [X]/100分

            ## 🔍 详细分析

            ### 1. 吸引力指数 ([X]/100分)
            - **情绪冲击力**: [具体分析]
            - **视觉张力**: [具体分析]
            - **卖点切入速度**: [具体分析]
            - **总体评价**: [综合评价]

