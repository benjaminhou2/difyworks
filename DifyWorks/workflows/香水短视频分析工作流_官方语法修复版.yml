            - 卖点导入逻辑 (35%权重): 从钩子到产品的逻辑连贯性
            - 互动引导自然度 (20%权重): 引导用户互动的自然程度

            ### 6. 🎨 画面美感度 (0-100分)

            **评估细则:**
            - 90-100分: 画面精美，质感突出，符合品牌调性
            - 80-89分: 画面美观，有一定质感
            - 70-79分: 画面一般，缺乏特色
            - 60-69分: 画面质量有问题，影响观感
            - 60分以下: 画面粗糙，严重影响产品形象

            **评估指标:**
            - 技术质量 (40%权重): 分辨率、稳定性、曝光、色彩
            - 美学风格 (35%权重): 风格匹配度和审美水平
            - 产品展示质量 (25%权重): 产品展示的专业性和美感

            ### 7. 🎵 声音配乐度 (0-100分)

            **评估细则:**
            - 90-100分: 声音清晰，配乐完美契合，增强表现力
            - 80-89分: 声音质量良好，配乐合适
            - 70-79分: 声音配乐一般，无明显问题
            - 60-69分: 声音配乐有缺陷，影响体验
            - 60分以下: 声音配乐严重问题，影响内容理解

            **评估指标:**
            - 口播质量 (45%权重): 发音清晰度、语调自然度、情绪表达
            - 配乐契合度 (35%权重): BGM与产品调性、内容情绪的匹配
            - 整体协调性 (20%权重): 音画同步效果和音效运用

