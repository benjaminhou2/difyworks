            请对以下3个维度进行专业评估，每个维度满分100分：

            ### 5. 📝 文案引导力 (0-100分)

            **评估细则:**
            - 90-100分: 文案引导性强，自然引发互动
            - 80-89分: 文案有吸引力，引导明确
            - 70-79分: 文案普通，引导效果一般
