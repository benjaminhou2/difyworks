          name: gpt-4o
          provider: openai
        prompt_template:
        - role: system
          text: |
            ## 🇪🇸 西班牙市场文案生成

            基于视频分析结果：{{#1736412003000.text#}}

            ## 📋 任务要求
            
            为这个香水短视频生成3条适用于西班牙TikTok市场的本地化文案，每条文案都要包含中文和西班牙语版本。

            ## 🎯 目标用户画像
            - **年龄**: 18-35岁西班牙女性
            - **平台**: TikTok
            - **文化特点**: 重视家庭和社交关系，喜欢自然美感
            - **语言偏好**: 情感表达直接热情，使用口语化表达

            ## 📝 文案要求

            ### 文案1: 情感共鸣型
            - **目标**: 建立情感连接，引发共鸣
            - **长度**: 中文50-80字，西班牙语相应长度
            - **特点**: 温暖、亲近、有代入感

            ### 文案2: 产品功能型
            - **目标**: 突出产品特色和使用效果
            - **长度**: 中文50-80字，西班牙语相应长度
            - **特点**: 具体、可信、有说服力

            ### 文案3: 互动引导型
            - **目标**: 引导用户互动和分享
            - **长度**: 中文50-80字，西班牙语相应长度
            - **特点**: 有趣、互动性强、传播性好

            ## 🌍 本地化要点
            
            1. **文化适配**: 
               - 考虑西班牙女性的生活方式
               - 避免过于商业化的表达
               - 融入当地社交文化特色

            2. **语言风格**:
               - 使用自然的口语表达
               - 适当使用情感化词汇
               - 避免过于正式的商业用语

            3. **情感表达**:
               - 体现拉丁文化的热情
               - 强调个人魅力和自信
               - 重视社交场合的重要性

            ## 📤 输出格式

            ```
            # 西班牙市场本地化文案

            ## 文案1: 情感共鸣型
            **中文版**: [中文文案内容]
            **西班牙语版**: [完整的西班牙语翻译和本地化调整]
            **应用场景**: [适合使用的场景说明]
            **预期效果**: [预期能达到的效果]

            ## 文案2: 产品功能型  
            **中文版**: [中文文案内容]
